version: "3.9"

services:
  web:
    build: .
    container_name: techsecure-web
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: techsecure
      MYSQL_PASSWORD: TechSecure123!
      MYSQL_DATABASE: techsecure
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: techsecure-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techsecure
      MYSQL_USER: techsecure
      MYSQL_PASSWORD: TechSecure123!
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d

volumes:
  mysql_data: